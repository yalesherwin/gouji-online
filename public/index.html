<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>够级竞技大厅 V3</title>
  <style>
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:#0b1f25;color:#fff}
    .topbar{height:56px;background:#102a33;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid #1d4653}
    .topbar .title{font-weight:800}
    .btn{border:0;border-radius:10px;padding:8px 12px;font-weight:700;cursor:pointer}
    .btn.blue{background:#2ea9ff;color:#fff}.btn.orange{background:#ffb33b;color:#4a2800}.btn.green{background:#7bdc39;color:#173400}.btn.gray{background:#607d8b;color:#fff}

    .table-wrap{position:relative;min-height:62vh;background:radial-gradient(circle at 50% 45%, #1da18f 0%, #0f6f66 55%, #0a4950 100%);overflow:hidden}
    .table-center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;background:rgba(0,0,0,.22);padding:14px 18px;border-radius:14px;min-width:280px}
    .phase{font-size:20px;font-weight:800;color:#ffe082}
    .clock{margin-top:8px;font-size:26px;font-weight:900}
    .declare{display:flex;gap:12px;justify-content:center;margin-top:12px}

    .seat{position:absolute;width:120px;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:6px;text-align:center;font-size:12px}
    .avatar{width:40px;height:40px;border-radius:50%;margin:0 auto 4px;background:linear-gradient(135deg,#7bdcff,#4ea1ff)}
    .s1{left:50%;top:10px;transform:translateX(-50%)} .s2{right:8px;top:100px} .s3{right:8px;bottom:140px}
    .s4{left:50%;bottom:120px;transform:translateX(-50%)} .s5{left:8px;bottom:140px} .s6{left:8px;top:100px}

    .board{background:#0f2932;padding:10px;border-top:1px solid #1a3f4c}
    .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
    input,select{background:#163946;color:#fff;border:1px solid #296074;border-radius:8px;padding:7px}

    .play-area{background:#112f3a;border-radius:10px;padding:8px;margin:6px 0}
    .last{font-size:14px;color:#ffecb3;margin-bottom:4px}

    .hand{display:flex;gap:4px;overflow-x:auto;padding:8px;background:#0c222b;border-radius:10px}
    .card{min-width:34px;height:52px;border-radius:6px;border:1px solid #ddd;background:#fff;color:#111;display:flex;align-items:center;justify-content:center;font-weight:800;cursor:pointer}
    .card.sel{transform:translateY(-8px);outline:2px solid #ffd54f}

    .logs{margin-top:8px;max-height:120px;overflow:auto;background:#0c222b;border-radius:8px;padding:8px;font-size:12px;white-space:pre-wrap}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">够级竞技大厅 · V3（重构中）</div>
    <div>
      <button class="btn blue" onclick="createRoom()">创建房间</button>
      <button class="btn gray" onclick="joinRoom()">加入房间</button>
    </div>
  </div>

  <div class="board">
    <div class="controls">
      名字 <input id="name" value="玩家宋学文" />
      房间码 <input id="room" placeholder="6位邀请码" />
      模式 <select id="mode"><option>不开点</option><option>打点</option></select>
      <button class="btn gray" onclick="readyToggle()">准备</button>
      <button class="btn gray" onclick="addBots()">补机器人</button>
      <button class="btn orange" onclick="startGame()">开始</button>
      <button class="btn orange" onclick="playSelected()">出牌</button>
      <button class="btn green" onclick="passTurn()">过牌</button>
    </div>
  </div>

  <div class="table-wrap">
    <div class="seat s1" id="seat1"><div class="avatar"></div>1号位<br/>空位</div>
    <div class="seat s2" id="seat2"><div class="avatar"></div>2号位<br/>空位</div>
    <div class="seat s3" id="seat3"><div class="avatar"></div>3号位<br/>空位</div>
    <div class="seat s4" id="seat4"><div class="avatar"></div>4号位<br/>空位</div>
    <div class="seat s5" id="seat5"><div class="avatar"></div>5号位<br/>空位</div>
    <div class="seat s6" id="seat6"><div class="avatar"></div>6号位<br/>空位</div>

    <div class="table-center">
      <div class="phase" id="phase">等待开局</div>
      <div class="clock" id="clock">--</div>
      <div class="declare" id="declareBox" style="display:none">
        <button class="btn orange" onclick="declarePoint(true)">宣点</button>
        <button class="btn green" onclick="declarePoint(false)">不宣</button>
      </div>
    </div>
  </div>

  <div class="board">
    <div class="play-area">
      <div class="last" id="lastPlay">上家：无</div>
      <div class="hand" id="myHand"></div>
    </div>
    <div class="logs" id="logs">系统启动...</div>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script>
const s = io({ transports:['websocket','polling'], reconnection:true });
const $ = id => document.getElementById(id);
let myId = '';
let myHand = [];
let selected = new Set();
let timer = null, left = 0;

function log(t){ $('logs').textContent = t + '\n' + $('logs').textContent; }
function setPhase(text){ $('phase').textContent = text; }
function setClock(t){ $('clock').textContent = t; }
function startTurnClock(sec=20){ clearInterval(timer); left=sec; setClock(left+'s'); timer=setInterval(()=>{ left--; setClock(left+'s'); if(left<=0){clearInterval(timer);} },1000); }

function createRoom(){ s.emit('room:create',{ name:$('name').value, mode:$('mode').value }); }
function joinRoom(){ const roomCode=$('room').value.trim().toUpperCase(); if(!roomCode) return; s.emit('room:join',{ roomCode, name:$('name').value }); }
function readyToggle(){ s.emit('player:ready'); }
function addBots(){ const n = Number(prompt('补几个机器人?','5')||5); s.emit('room:addBots',{count:n}); }
function startGame(){ s.emit('game:start'); }
function playSelected(){ const cards=[...selected]; if(!cards.length) return alert('先选牌'); s.emit('play:cards',{cards}); }
function passTurn(){ s.emit('play:pass'); }

function declarePoint(v){
  $('declareBox').style.display='none';
  log(v ? '你选择了 宣点' : '你选择了 不宣');
  setPhase('出牌阶段');
}

function renderHand(){
  const box = $('myHand'); box.innerHTML='';
  myHand.forEach(c=>{
    const d=document.createElement('div'); d.className='card'+(selected.has(c)?' sel':''); d.textContent=c;
    d.onclick=()=>{ if(selected.has(c)) selected.delete(c); else selected.add(c); renderHand(); };
    box.appendChild(d);
  });
}

s.on('connect',()=>{ myId=s.id; log('✅ 已连接: '+s.id); });
s.on('err',msg=> alert(msg));
s.on('room:created',({roomCode})=>{ $('room').value=roomCode; alert('房间码: '+roomCode); });

s.on('room:update',d=>{
  for(let i=1;i<=6;i++){
    const seat=d.seats[i-1];
    $('seat'+i).innerHTML = seat ? `<div class='avatar'></div>${i}号位 ${seat.name}${seat.isBot?'[BOT]':''}<br>${seat.ready?'已准备':'未准备'} | 手牌:${seat.cards}` : `<div class='avatar'></div>${i}号位<br>空位`;
  }
  if(d.logs?.length) log('📝 '+d.logs[d.logs.length-1]);
});

s.on('game:state',g=>{
  if(!g.started){ setPhase('等待开局'); setClock('--'); return; }
  setPhase('出牌阶段');
  const myTurn = g.turnPlayerId===myId;
  if(myTurn) startTurnClock(20);
  $('lastPlay').textContent = g.lastPlay ? `上家：${g.lastPlay.playerName} -> ${g.lastPlay.cards.join(' ')}` : '上家：无（自由出牌）';
});

s.on('player:hand',d=>{
  myHand = d.hand; selected.clear(); renderHand();
  $('declareBox').style.display='flex';
  setPhase('宣布对家是否开点');
  startTurnClock(10);
  log(d.qualified ? '✅ 验牌通过（2张3+2张4）' : '⚠️ 验牌不满足，需买2');
});
</script>
</body>
</html>
